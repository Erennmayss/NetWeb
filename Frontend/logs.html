<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGuard - Audit Logs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="auth.js"></script>
  <script src="netguard-audit.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="layout.css" />
  <link rel="stylesheet" href="sidebar.css" />
  <link rel="stylesheet" href="topbar.css" />
  <link rel="stylesheet" href="dark-mode.css" />
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .topbar     { animation: slideDown 0.4s ease; }
    .animate-in { animation: fadeInUp 0.4s ease backwards; animation-delay: 0.1s; }
    .table-row  { animation: rowSlideIn 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) both; }
    @keyframes slideDown  { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes rowSlideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen app-body">
  <div class="app-shell">
    <aside id="sidebar-root" class="sidebar-host" data-page="logs"></aside>
    <main class="main">
      <div id="topbar-root"
           data-title="Audit Logs"
           data-subtitle="Consultation en lecture seule des evenements de securite et d'administration."
           data-notifications="2"></div>
      <section class="content">
        <div id="logs-root" class="page-block"></div>
      </section>
    </main>
  </div>

<script type="text/babel">
// Référence aux logs root pour le rendu React
const logsRoot = document.getElementById('pageContent');

/* ═══════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════ */
const API = '/api/logs';
const RESET = '/api/reset';
let allLogs = [], filteredLogs = [], idsPage = 1, idsSevFilter = 'all';
const IDS_PER = 25;

const auditEvents = [
  { id: 1, date: '17/04/2026 09:12', actor: 'admin',  action: 'Création utilisateur',   target: 'soc_lead',                 severity: 'Info'   },
  { id: 2, date: '17/04/2026 08:48', actor: 'sec',    action: 'Activation règle IDS',   target: 'Heartbleed custom rule',   severity: 'High'   },
  { id: 3, date: '17/04/2026 08:10', actor: 'net',    action: 'Modification VLAN',       target: 'VLAN 20 / IT',             severity: 'Medium' },
  { id: 4, date: '16/04/2026 18:22', actor: 'audit',  action: 'Consultation journal',    target: 'Rapport incidents Q2',     severity: 'Info'   },
  { id: 5, date: '16/04/2026 17:54', actor: 'admin',  action: 'Changement rôle',         target: 'viewer → security_admin',  severity: 'High'   },
  { id: 6, date: '16/04/2026 14:30', actor: 'net',    action: 'Ajout règle firewall',    target: 'Rule #142 / TCP 443',      severity: 'Medium' },
  { id: 7, date: '16/04/2026 11:05', actor: 'sec',    action: 'Scan vulnérabilités',     target: 'Subnet 10.0.0.0/24',       severity: 'Info'   },
];

let currentTab = 'ids';

function setConnected(ok) {
  // Gardé pour compatibilité
}

/* ═══════════════════════════════════════════════
   TAB SWITCH
═══════════════════════════════════════════════ */
function switchTab(tab) {
  currentTab = tab;
  renderPage();
}

function renderPage() {
  if (currentTab === 'ids') renderIDSPage();
  else renderAuditPage();
}

/* ═══════════════════════════════════════════════
   IDS PAGE
═══════════════════════════════════════════════ */
async function fetchLogs() {
  try {
    const r = await fetch(API);
    const d = await r.json();
    if (d.success) {
      setConnected(true);
      allLogs = d.logs || [];
      updateKPIs(d);
    } else { setConnected(false); loadFallback(); }
  } catch { setConnected(false); loadFallback(); }
}

function loadFallback() {
  allLogs = [
    { id:'a1', name:'ET SCAN Potential SSH Scan', severity:'critical', src_ip:'45.33.32.156', src_port:4444, dst_ip:'10.0.0.22', dst_port:22, proto:'TCP', count:87, first_seen:'2026-04-17T07:12:00', last_seen:'2026-04-17T09:10:00', ids:['SID:2001219','SID:2001220'] },
    { id:'a2', name:'ET EXPLOIT Heartbleed OpenSSL CVE-2014-0160', severity:'critical', src_ip:'91.108.4.1', src_port:3210, dst_ip:'10.0.0.5', dst_port:443, proto:'TCP', count:12, first_seen:'2026-04-17T08:45:00', last_seen:'2026-04-17T08:48:00', ids:['SID:2018479'] },
    { id:'a3', name:'ET POLICY DNS Query for TOR2WEB Domain', severity:'medium', src_ip:'10.0.0.14', src_port:52301, dst_ip:'8.8.8.8', dst_port:53, proto:'UDP', count:34, first_seen:'2026-04-16T15:30:00', last_seen:'2026-04-17T08:55:00', ids:['SID:2523244'] },
    { id:'a4', name:'ICMP Ping Sweep', severity:'medium', src_ip:'192.168.1.50', src_port:0, dst_ip:'10.0.0.0/24', dst_port:0, proto:'ICMP', count:256, first_seen:'2026-04-16T22:00:00', last_seen:'2026-04-16T22:03:00', ids:['SID:469'] },
    { id:'a5', name:'ET INFO SMB NT Create AndX Request For an Executable File', severity:'low', src_ip:'10.0.0.8', src_port:49200, dst_ip:'10.0.0.3', dst_port:445, proto:'TCP', count:5, first_seen:'2026-04-17T06:00:00', last_seen:'2026-04-17T09:00:00', ids:['SID:2006445'] },
    { id:'a6', name:'ET SCAN Nmap Scripting Engine User-Agent', severity:'medium', src_ip:'172.16.0.9', src_port:55000, dst_ip:'10.0.0.22', dst_port:80, proto:'TCP', count:3, first_seen:'2026-04-17T09:05:00', last_seen:'2026-04-17T09:06:00', ids:['SID:2009358'] },
    { id:'a7', name:'GPL ATTACK_RESPONSE id check returned root', severity:'low', src_ip:'10.0.0.1', src_port:80, dst_ip:'10.0.0.20', dst_port:54321, proto:'TCP', count:1, first_seen:'2026-04-17T07:55:00', last_seen:'2026-04-17T07:55:00', ids:['SID:2100498'] },
  ];
  updateKPIs({ raw_count: allLogs.reduce((s,l) => s + l.count, 0), aggregated_count: allLogs.length, unique_ips: new Set(allLogs.map(l => l.src_ip)).size, rate_per_minute: 2.3 });
}

function updateKPIs(d) {
  const el = id => document.getElementById(id);
  if (el('kpiRaw'))    el('kpiRaw').textContent    = fmt(d.raw_count        || 0);
  if (el('kpiUnique')) el('kpiUnique').textContent  = fmt(d.aggregated_count || 0);
  if (el('kpiIPs'))    el('kpiIPs').textContent     = fmt(d.unique_ips       || 0);
  if (el('kpiRate'))   el('kpiRate').textContent    = fmt(d.rate_per_minute  || 0);
  const crit = allLogs.filter(l => l.severity === 'critical').length;
  if (el('critBadge')) el('critBadge').textContent  = crit + ' critiques';
  if (el('tcAll'))  el('tcAll').textContent  = allLogs.length;
  if (el('tcCrit')) el('tcCrit').textContent = crit;
  if (el('tcMed'))  el('tcMed').textContent  = allLogs.filter(l=>l.severity==='medium').length;
  if (el('tcLow'))  el('tcLow').textContent  = allLogs.filter(l=>l.severity==='low').length;
}

function renderIDSPage() {
  logsRoot.innerHTML = `
    <!-- KPI Strip -->
    <div class="kpi-strip">
      <div class="kpi"><div class="kpi-left"><span class="kpi-label">Alertes brutes</span><span class="kpi-val" id="kpiRaw">—</span><span class="kpi-sub" style="background:var(--primary-bg);color:var(--primary)">Total cumulé</span></div><div class="kpi-icon-wrap" style="background:var(--primary-bg)">📊</div></div>
      <div class="kpi"><div class="kpi-left"><span class="kpi-label">Signatures uniques</span><span class="kpi-val" id="kpiUnique">—</span><span class="kpi-sub" style="background:var(--primary-bg);color:var(--primary)">Agrégées</span></div><div class="kpi-icon-wrap" style="background:#f5f3ff">🔍</div></div>
      <div class="kpi"><div class="kpi-left"><span class="kpi-label">Sources IP attaquantes</span><span class="kpi-val red" id="kpiIPs">—</span><span class="kpi-sub" id="critBadge" style="background:#fee2e2;color:var(--critical)">— critiques</span></div><div class="kpi-icon-wrap" style="background:#fee2e2">🌐</div></div>
      <div class="kpi"><div class="kpi-left"><span class="kpi-label">Taux alertes / min</span><span class="kpi-val amber" id="kpiRate">—</span><span class="kpi-sub" style="background:var(--medium-bg);color:var(--medium)">Temps réel</span></div><div class="kpi-icon-wrap" style="background:var(--medium-bg)">⚡</div></div>
    </div>

    <!-- BOUTONS D'ONGLETS MODERNES -->
    <div class="tabs-modern">
      <button class="tab-modern ${currentTab === 'ids' ? 'active' : ''}" onclick="switchTab('ids')">
        <span class="tab-icon">🛡️</span>
        <span>Alertes IDS</span>
        <span class="tab-badge" id="idsBadge">${allLogs.length}</span>
      </button>
      <button class="tab-modern ${currentTab === 'audit' ? 'active' : ''}" onclick="switchTab('audit')">
        <span class="tab-icon">📋</span>
        <span>Journal d'audit</span>
        <span class="tab-badge" id="auditBadge">${auditEvents.length}</span>
      </button>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <span class="filter-label">🔍 Filtre</span>
      <div class="threat-pills">
        <button class="tpill all active" onclick="setSev('all',this)"><span class="tdot"></span> Toutes <span id="tcAll">0</span></button>
        <button class="tpill crit" onclick="setSev('critical',this)"><span class="tdot"></span> Critiques <span id="tcCrit">0</span></button>
        <button class="tpill med" onclick="setSev('medium',this)"><span class="tdot"></span> Moyennes <span id="tcMed">0</span></button>
        <button class="tpill low" onclick="setSev('low',this)"><span class="tdot"></span> Faibles <span id="tcLow">0</span></button>
      </div>
      <div class="divider"></div>
      <div class="search-wrap">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="idsSearch" placeholder="Signature, IP source, destination…" oninput="applyIDSFilters()">
      </div>
      <select class="proto-select" id="protoFilter" onchange="applyIDSFilters()">
        <option value="all">Tous protocoles</option>
        <option value="TCP">TCP</option>
        <option value="UDP">UDP</option>
        <option value="ICMP">ICMP</option>
      </select>
    </div>

          {/* Cartes statistiques */}
          <div className="mb-6 grid gap-4 md:grid-cols-4">
            <div className="stat-mini-card rounded-[1.5rem] border border-slate-200 bg-white p-5 shadow-sm">
              <div className="text-[10px] font-black uppercase tracking-widest text-slate-400">Total events</div>
              <div className="mt-2 text-3xl font-bold text-slate-800">{logs.length}</div>
            </div>
            <div className="stat-mini-card rounded-[1.5rem] border border-slate-200 bg-white p-5 shadow-sm">
              <div className="text-[10px] font-black uppercase tracking-widest text-slate-400">High / Critical</div>
              <div className="mt-2 text-3xl font-bold text-rose-600">{highCount}</div>
            </div>
            <div className="stat-mini-card rounded-[1.5rem] border border-slate-200 bg-white p-5 shadow-sm">
              <div className="text-[10px] font-black uppercase tracking-widest text-slate-400">Affichés</div>
              <div className="mt-2 text-3xl font-bold text-indigo-600">{filtered.length}</div>
            </div>
            <div className="stat-mini-card rounded-[1.5rem] border border-slate-200 bg-white p-5 shadow-sm">
              <div className="text-[10px] font-black uppercase tracking-widest text-slate-400">Mode</div>
              <div className="mt-2 text-2xl font-bold text-emerald-600">Read Only</div>
            </div>
          </div>

          {/* Barre filtres */}
          <div className="mb-4 flex flex-wrap gap-3 items-center">
            <input
              type="text"
              placeholder="Rechercher acteur, action, cible…"
              value={search}
              onChange={e => setSearch(e.target.value)}
              className="flex-1 min-w-[200px] rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            />
            <select
              value={sevFilter}
              onChange={e => setSevFilter(e.target.value)}
              className="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            >
              <option value="all">Toutes sévérités</option>
              <option value="Info">Info</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
              <option value="Critical">Critical</option>
            </select>
            <button onClick={exportCSV}
              className="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 transition-colors">
              ↓ Export CSV
            </button>
            <button onClick={clearLogs}
              className="rounded-xl border border-rose-200 bg-rose-50 px-4 py-2 text-sm font-semibold text-rose-600 shadow-sm hover:bg-rose-100 transition-colors">
              🗑 Vider
            </button>
          </div>

          {/* Tableau */}
          <div className="table-card overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-xl shadow-indigo-600/20">
            <div className="overflow-x-auto">
              <table className="w-full text-left">
                <thead className="bg-slate-50/80 border-b border-slate-100">
                  <tr>
                    <th className="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Date</th>
                    <th className="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Acteur</th>
                    <th className="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Rôle</th>
                    <th className="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Action</th>
                    <th className="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Cible</th>
                    <th className="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Sévérité</th>
                    <th className="px-6 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Résultat</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">

                  {filtered.length === 0 && (
                    <tr>
                      <td colSpan={7} className="px-6 py-16 text-center">
                        <div className="flex flex-col items-center gap-3">
                          <span className="text-4xl">📋</span>
                          <p className="text-slate-400 font-medium text-sm">
                            {logs.length === 0
                              ? 'Aucun événement d\'audit enregistré.'
                              : 'Aucun événement ne correspond à vos filtres.'}
                          </p>
                          {logs.length === 0 && (
                            <p className="text-slate-300 text-xs max-w-sm text-center">
                              Les actions effectuées dans les autres pages (création utilisateur,
                              VLAN, connexion…) apparaîtront ici automatiquement.
                            </p>
                          )}
                        </div>
                      </td>
                    </tr>
                  )}

                  {filtered.map((event, index) => (
                    <tr
                      key={event.id}
                      className="table-row hover:bg-slate-50/80 transition-colors"
                      style={{ animationDelay: `${Math.min(index, 20) * 0.04}s` }}
                    >
                      {/* Date */}
                      <td className="px-6 py-4 font-mono text-xs text-slate-400 whitespace-nowrap">
                        {event.date}
                      </td>

                      {/* ✅ Acteur = session.username de la personne connectée */}
                      <td className="px-6 py-4 font-semibold text-sm text-slate-700 whitespace-nowrap">
                        {event.actor}
                      </td>

                      {/* Rôle */}
                      <td className="px-6 py-4 text-xs text-slate-400 whitespace-nowrap">
                        {event.role || '—'}
                      </td>

                      {/* Action */}
                      <td className="px-6 py-4 text-sm font-medium text-slate-600 whitespace-nowrap">
                        {event.action}
                      </td>

                      {/* Cible */}
                      <td className="px-6 py-4 text-sm text-slate-500 max-w-xs truncate" title={event.target}>
                        {event.target}
                      </td>

                      {/* Sévérité */}
                      <td className="px-6 py-4 whitespace-nowrap">
                        <span className={`inline-flex rounded-full px-3 py-1 text-[11px] font-bold ${SEV_CLASS[event.severity] || SEV_CLASS.Info}`}>
                          {event.severity}
                        </span>
                      </td>

                      {/* Résultat */}
                      <td className="px-6 py-4 whitespace-nowrap">
                        <span className={`inline-flex rounded-full px-3 py-1 text-[11px] font-bold ${
                          event.result === 'error'
                            ? 'bg-rose-100 text-rose-600'
                            : 'bg-emerald-100 text-emerald-700'
                        }`}>
                          {event.result === 'error' ? 'Erreur' : 'OK'}
                        </span>
                      </td>
                    </tr>
                  ))}

                </tbody>
              </table>
            </div>

            {filtered.length > 0 && (
              <div className="border-t border-slate-100 px-6 py-3 text-xs text-slate-400 flex items-center justify-between">
                <span>{filtered.length} événement{filtered.length > 1 ? 's' : ''} affiché{filtered.length > 1 ? 's' : ''}</span>
                <span>Stockage : localStorage du navigateur — Read Only</span>
              </div>
            )}
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('logs-root')).render(<LogsPage />);
  </script>
  <script src="sidebar.js"></script>
  <script src="topbar.js"></script>
</body>
</html>
